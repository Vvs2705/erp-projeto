# Fly.io — ERP-V backend (FastAPI).
#
# IMPORTANTE: este arquivo fica na RAIZ do monorepo de propósito. O
# backend/Dockerfile copia ./backend, ./fiscal-engine e ./integrations, então o
# contexto de build precisa ser a raiz do repositório (o diretório deste fly.toml).
#
# Secrets NÃO ficam aqui. Defina via `flyctl secrets set`:
#   SECRET_KEY, DATABASE_URL, CORS_ORIGINS  (e fiscais, se aplicável)

app = "erp-v-backend"
primary_region = "gru"  # São Paulo

[build]
  dockerfile = "backend/Dockerfile"

[deploy]
  # Aplica as migrações Alembic antes de liberar a nova versão. Roda em uma VM
  # efêmera com os secrets disponíveis; se falhar, o deploy é abortado.
  release_command = "alembic upgrade head"

[env]
  ENV = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
